name: Publish React Packages

on:
  push:
    paths:
      - '.changeset/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com
          scope: '@bcl32'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for pending changesets
        id: changesets
        run: |
          # Count changeset files (excluding README.md and config.json)
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count pending changeset(s)"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets found"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          pnpm changeset version
          pnpm install --no-frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect bumped packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bash .github/scripts/publish-verify.sh detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm -r build

      - name: Pre-publish collision check
        # Fails BEFORE publishing if a bumped version already exists on the
        # registry with DIFFERENT contents (the 2026-07-04 stale-artifact
        # incident). An identical already-published artifact is treated as a
        # benign retry. See .github/scripts/publish-verify.sh.
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bash .github/scripts/publish-verify.sh precheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          set +e
          out="$(pnpm -r publish --no-git-checks 2>&1)"
          rc=$?
          set -e
          printf '%s\n' "$out"
          # `pnpm -r publish` queries the registry and skips any version that is
          # already published (it prints "There are no new packages that should
          # be published" and exits 0). The Pre-publish collision check above has
          # already hard-failed on any DIFFERENT artifact sitting on a bumped
          # version. So any non-zero exit here is a genuine failure — auth,
          # network, build, or a real registry error — and must fail the release
          # loudly instead of being swallowed.
          if [ "$rc" -ne 0 ]; then
            echo "::error::Publish failed (exit $rc) — see the pnpm/npm error above"
            exit "$rc"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published versions
        # Confirms every bumped version is actually present on the registry
        # (retries for propagation lag) before the version commit is pushed.
        if: steps.changesets.outputs.has_changesets == 'true'
        run: bash .github/scripts/publish-verify.sh postcheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version changes and push
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: version packages [skip ci]"
            git push
          else
            echo "No version changes to commit"
          fi
