name: Publish React Packages

on:
  push:
    paths:
      - '.changeset/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com
          scope: '@bcl32'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for pending changesets
        id: changesets
        run: |
          # Count changeset files (excluding README.md and config.json)
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count pending changeset(s)"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets found"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          pnpm changeset version
          pnpm install --no-frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm -r build

      - name: Publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          pnpm -r publish --no-git-checks 2>&1 | while IFS= read -r line; do
            echo "$line"
            # Skip 409 conflict errors (already published)
            if echo "$line" | grep -q 'Cannot publish over existing version'; then
              echo "Version already published — skipping"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tags
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          for pkg_dir in utils data-utils hooks themes forms charts navigation datatable filters; do
            pkg_json="$pkg_dir/package.json"
            if [ -f "$pkg_json" ]; then
              version=$(node -p "require('./$pkg_json').version")
              tag="@bcl32/${pkg_dir}@${version}"
              if ! git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
                git tag -a "$tag" -m "$tag"
                echo "Created tag: $tag"
              else
                echo "Tag $tag already exists, skipping"
              fi
            fi
          done

      - name: Commit version changes and push
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: version packages [skip ci]"
            git push --follow-tags
          else
            echo "No version changes to commit"
          fi
